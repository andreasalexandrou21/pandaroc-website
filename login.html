<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="dark" />
<meta name="robots" content="noindex" />
<title>Log in · PandaRoc</title>
<link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared/tokens.css" />
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:28px; }
.auth-card { position:relative; z-index:2; width:100%; max-width:420px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-xl); padding:42px 38px; box-shadow:var(--shadow-lg); overflow:hidden; }
.auth-card::before { content:''; position:absolute; inset:0; background-image:url('assets/grain-card.svg'); background-size:220px; opacity:0.05; mix-blend-mode:overlay; pointer-events:none; }
.auth-card > * { position:relative; }
.auth-glow { position:absolute; top:-150px; left:50%; transform:translateX(-50%); width:360px; height:280px; border-radius:50%; filter:blur(120px); background:radial-gradient(circle, color-mix(in oklch, var(--tc9) 24%, transparent), transparent 70%); pointer-events:none; z-index:0; }
.auth-brand { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:18px; }
.auth-brand img { height:30px; filter:drop-shadow(0 1px 4px rgba(0,0,0,0.3)); }
.auth-brand span { font-size:22px; font-weight:700; letter-spacing:-0.3px; }
.auth-brand .accent { color:var(--accent); }
.auth-title { text-align:center; font-size:24px; font-weight:800; letter-spacing:-0.02em; margin-bottom:8px; }
.auth-sub { text-align:center; color:var(--muted); font-size:13.5px; line-height:1.55; margin-bottom:26px; }
.field { margin-bottom:15px; }
.field label { display:block; font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
.field input { width:100%; padding:12px 14px; background:var(--bg-elev); border:1px solid var(--border-strong); border-radius:var(--r-md); color:var(--text); font-family:inherit; font-size:14px; outline:none; transition:border-color var(--dur) var(--ease); }
.field input::placeholder { color:var(--subtle); }
.field input:focus { border-color:var(--accent); }
.auth-submit { width:100%; justify-content:center; margin-top:8px; }
.auth-error { color:#ef6a5e; font-size:12.5px; margin-top:12px; text-align:center; display:none; }
.auth-error a { color:var(--accent); }
.auth-links { text-align:center; margin-top:20px; font-size:13px; color:var(--muted); }
.auth-links a { color:var(--accent); }
.auth-links a:hover { text-decoration:underline; }
.auth-back { text-align:center; margin-top:10px; font-size:12.5px; }
.auth-back a { color:var(--muted); }
.auth-back a:hover { color:var(--text); }
</style>
</head>
<body>
<div class="grain-body" aria-hidden="true"></div>
<div class="grain-coarse" aria-hidden="true"></div>
<div class="auth-card">
  <div class="auth-glow" aria-hidden="true"></div>
  <div class="auth-brand">
    <img src="assets/logo.png" alt="" />
    <span><span class="accent">Panda</span>Roc</span>
  </div>
  <h1 class="auth-title">Welcome back</h1>
  <p class="auth-sub">Log in to view your license key or manage your subscription.</p>
  <form id="login-form" onsubmit="return handleLogin(event)">
    <div class="field">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="you@company.com" required>
    </div>
    <div class="field">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" required>
    </div>
    <button type="submit" class="btn btn-primary auth-submit" id="login-btn">Log In</button>
    <p class="auth-error" id="login-error"></p>
  </form>
  <p class="auth-links">No account yet? <a href="register.html">Start a free trial</a></p>
  <p class="auth-back"><a href="index.html">&larr; Back to PandaRoc</a></p>
</div>

<script src="auth.js"></script>
<script>
const API = 'https://api.pandaroc.com';

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Logging in...';

  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('login-email').value.trim(),
        password: document.getElementById('login-password').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.detail || 'Login failed';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Log In';
      return false;
    }
    saveTokens(data);
    window.location.href = 'account.html';
  } catch (err) {
    errEl.textContent = 'Could not reach server. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Log In';
  }
  return false;
}
</script>
</body>
</html>
