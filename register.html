<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="dark" />
<meta name="robots" content="noindex" />
<title>Start your free trial · PandaRoc</title>
<link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared/tokens.css" />
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:28px; }
.auth-card { position:relative; z-index:2; width:100%; max-width:440px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-xl); padding:42px 38px; box-shadow:var(--shadow-lg); overflow:hidden; }
.auth-card::before { content:''; position:absolute; inset:0; background-image:url('assets/grain-card.svg'); background-size:220px; opacity:0.05; mix-blend-mode:overlay; pointer-events:none; }
.auth-card > * { position:relative; }
.auth-glow { position:absolute; top:-160px; left:50%; transform:translateX(-50%); width:380px; height:300px; border-radius:50%; filter:blur(120px); background:radial-gradient(circle, color-mix(in oklch, var(--tc9) 26%, transparent), transparent 70%); pointer-events:none; z-index:0; }
.auth-brand { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:16px; }
.auth-brand img { height:30px; filter:drop-shadow(0 1px 4px rgba(0,0,0,0.3)); }
.auth-brand span { font-size:22px; font-weight:700; letter-spacing:-0.3px; }
.auth-brand .accent { color:var(--accent); }
.auth-sub { text-align:center; color:var(--muted); font-size:13.5px; line-height:1.55; margin-bottom:18px; }
.trial-badge { display:inline-flex; align-items:center; gap:7px; font-family:'JetBrains Mono',monospace; font-size:10.5px; font-weight:500; letter-spacing:0.05em; text-transform:uppercase; color:var(--green10); background:color-mix(in oklch, var(--green10) 12%, transparent); border:1px solid color-mix(in oklch, var(--green10) 26%, transparent); padding:6px 13px; border-radius:999px; margin-bottom:22px; }
.trial-badge::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--green10); box-shadow:0 0 7px var(--green10); }
.badge-row { text-align:center; }
.field { margin-bottom:15px; }
.field label { display:block; font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
.field input { width:100%; padding:12px 14px; background:var(--bg-elev); border:1px solid var(--border-strong); border-radius:var(--r-md); color:var(--text); font-family:inherit; font-size:14px; outline:none; transition:border-color var(--dur) var(--ease); }
.field input::placeholder { color:var(--subtle); }
.field input:focus { border-color:var(--accent); }
.auth-submit { width:100%; justify-content:center; margin-top:8px; }
.auth-error { color:#ef6a5e; font-size:12.5px; margin-top:12px; text-align:center; display:none; }
.auth-error a { color:var(--accent); }
.perks { display:flex; flex-direction:column; gap:10px; margin:22px 0 4px; padding:18px 20px; background:var(--bg-elev); border:1px solid var(--border); border-radius:var(--r-lg); }
.perk { display:flex; align-items:center; gap:10px; font-size:12.5px; color:var(--text-2); }
.perk svg { flex-shrink:0; width:15px; height:15px; color:var(--green10); }
.auth-links { text-align:center; margin-top:20px; font-size:13px; color:var(--muted); }
.auth-links a { color:var(--accent); }
.auth-links a:hover { text-decoration:underline; }
.auth-back { text-align:center; margin-top:10px; font-size:12.5px; }
.auth-back a { color:var(--muted); }
.auth-back a:hover { color:var(--text); }
</style>
</head>
<body>
<div class="grain-body" aria-hidden="true"></div>
<div class="grain-coarse" aria-hidden="true"></div>
<div class="auth-card">
  <div class="auth-glow" aria-hidden="true"></div>
  <div class="auth-brand">
    <img src="assets/logo.png" alt="" />
    <span><span class="accent">Panda</span>Roc</span>
  </div>
  <p class="auth-sub">Create your account and start automating ROC certificate downloads in minutes.</p>

  <div class="badge-row">
    <span class="trial-badge" id="reg-badge">7-day free trial · cancel anytime</span>
  </div>

  <form id="register-form" onsubmit="return handleRegister(event)">
    <div class="field">
      <label for="reg-name">Full name</label>
      <input type="text" id="reg-name" placeholder="e.g. Panicos Alexandrou" required>
    </div>
    <div class="field">
      <label for="reg-email">Email</label>
      <input type="email" id="reg-email" placeholder="you@company.com" required>
    </div>
    <div class="field">
      <label for="reg-password">Password</label>
      <input type="password" id="reg-password" placeholder="At least 8 characters" minlength="8" required>
    </div>
    <button type="submit" class="btn btn-primary auth-submit" id="reg-btn">Start Free Trial</button>
    <p class="auth-error" id="reg-error"></p>
  </form>

  <div class="perks">
    <div class="perk">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      Full access to all features for 7 days
    </div>
    <div class="perk">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      Card required, first charge only after day 7
    </div>
    <div class="perk">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      Works on Windows and macOS
    </div>
  </div>

  <p class="auth-links">Already have an account? <a href="login.html">Log in</a></p>
  <p class="auth-back"><a href="index.html">&larr; Back to PandaRoc</a></p>
</div>

<script src="auth.js"></script>
<script>
const API = 'https://api.pandaroc.com';

// Buyer arriving from "Buy now": reflect checkout intent, not trial.
(function () {
  if (localStorage.getItem('pandaroc_pending_trial') === '0') {
    const b = document.getElementById('reg-badge');
    if (b) b.textContent = 'Final step: create your account, then checkout';
    const btn = document.getElementById('reg-btn');
    if (btn) btn.textContent = 'Continue to payment';
  }
})();

async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('reg-btn');
  const errEl = document.getElementById('reg-error');
  errEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Creating account...';

  try {
    const res = await fetch(API + '/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('reg-name').value.trim(),
        email: document.getElementById('reg-email').value.trim(),
        password: document.getElementById('reg-password').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 409) {
        errEl.innerHTML = 'That email is already registered. <a href="login.html" style="color:var(--accent);text-decoration:underline;">Log in instead</a>.';
      } else {
        errEl.textContent = (typeof data.detail === 'string') ? data.detail : 'Please check your details and try again.';
      }
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Start Free Trial';
      return false;
    }
    saveTokens(data);

    // Every signup goes through Stripe Checkout. Buyers (pending_trial '0') pay now;
    // everyone else gets the card-required 7-day trial.
    const pendingQty = Math.max(1, Math.min(20, parseInt(localStorage.getItem('pandaroc_pending_qty') || '1', 10)));
    const isTrial = localStorage.getItem('pandaroc_pending_trial') !== '0';
    localStorage.removeItem('pandaroc_pending_qty');
    localStorage.removeItem('pandaroc_pending_trial');

    btn.textContent = isTrial ? 'Starting your trial...' : 'Starting checkout...';
    try {
      const co = await fetch(API + '/stripe/create-checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + data.access_token },
        body: JSON.stringify({
          quantity: pendingQty,
          trial: isTrial,
          success_url: window.location.origin + '/success.html' + (isTrial ? '?trial=1' : ''),
          cancel_url: window.location.origin + '/cancel.html',
        }),
      });
      if (co.ok) {
        const cod = await co.json();
        window.location.href = cod.checkout_url;
        return false;
      }
      const cerr = await co.json().catch(() => ({}));
      errEl.textContent = (typeof cerr.detail === 'string') ? cerr.detail : 'Account created, but checkout could not start. Open your account to try again.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Start Free Trial';
      return false;
    } catch (err2) {
      // Account exists; send them to the account page to start checkout from there.
      window.location.href = 'account.html';
      return false;
    }
  } catch (err) {
    errEl.textContent = 'Could not reach server. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Start Free Trial';
  }
  return false;
}
</script>
</body>
</html>
